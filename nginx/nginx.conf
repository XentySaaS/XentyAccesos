worker_processes 1;
events { worker_connections 1024; }

http {
  # Encabezados comunes (heredados por todos los server/location).
  # Host se PRESERVA CON PUERTO ($http_host) para que django-tenants resuelva el tenant por
  # subdominio (ignora el puerto al matchear el dominio) y para que request.get_host() en el
  # backend construya URLs absolutas correctas en dev (incluye :8080 en los links de correo).
  map $http_upgrade $conn_upgrade { default upgrade; '' close; }

  # Host del panel de proveedores del tenant: '<slug>.dominio[:puerto]' → '<slug>.proveedores.dominio[:puerto]'.
  # Se usa para el 301 del path viejo '/proveedores/…' (correos/bookmarks anteriores al cambio de host).
  # OJO: las capturas nombradas son GLOBALES en nginx; el prefijo pph_ evita pisar las del location.
  map $http_host $panel_proveedores_host {
    ~^(?<pph_slug>[^.]+)\.(?<pph_resto>.+)$  $pph_slug.proveedores.$pph_resto;
    default                                  $http_host;
  }

  # Tamaño máximo del cuerpo. El default de nginx (1 MB) rechazaba con 413 el onboarding de
  # proveedor (multipart con INE + selfie + REPSE/SUA ≈ 2 MB) ANTES de llegar al backend, y el
  # cliente solo veía "Error al enviar". 25 MB cubre subidas de documentos/imágenes con margen.
  client_max_body_size 25m;

  proxy_set_header Host $http_host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_http_version 1.1;
  proxy_set_header Upgrade $http_upgrade;
  proxy_set_header Connection $conn_upgrade;

  # ── DNS interno de Docker (embedded DNS en 127.0.0.11) ─────────────────────
  # Con `resolver` + un HOSTNAME EN VARIABLE dentro de proxy_pass, nginx re-resuelve la IP del
  # contenedor en tiempo de request (TTL `valid`), en vez de cachearla al arrancar. Así, cuando un
  # contenedor se recrea y cambia de IP (p. ej. tras `docker compose up`/`down`), nginx la reengancha
  # solo — sin reiniciar nginx. (Antes, con el host literal en proxy_pass, la IP quedaba cacheada y el
  # tenant daba 502/404 hasta reiniciar nginx.)
  resolver 127.0.0.11 valid=10s ipv6=off;

  # ── Landing pública: xenty.localhost ───────────────────────────────────────
  server {
    listen 80;
    server_name xenty.localhost www.localhost;
    location /health/ { set $u superadmin-backend; proxy_pass http://$u:8000; }
    location /api/    { set $u superadmin-backend; proxy_pass http://$u:8000; }
    location /        { set $u frontend-landing;   proxy_pass http://$u:5173; }
  }

  # ── Panel super-admin AISLADO: admin.localhost ─────────────────────────────
  server {
    listen 80;
    server_name admin.localhost;
    location /health/ { set $u superadmin-backend; proxy_pass http://$u:8000; }
    location /api/    { set $u superadmin-backend; proxy_pass http://$u:8000; }
    location /        { set $u frontend-admin;     proxy_pass http://$u:5176; }
  }

  # ── Hub de login de proveedores: proveedores.localhost ─────────────────────
  # Solo descubre espacios (email → código → lista) contra el control plane; el login real
  # ocurre en el panel del tenant elegido. La misma SPA de proveedores se sirve en "modo hub".
  server {
    listen 80;
    server_name proveedores.localhost;
    location /health/ { set $u superadmin-backend;   proxy_pass http://$u:8000; }
    location /api/    { set $u superadmin-backend;   proxy_pass http://$u:8000; }
    location /        { set $u frontend-proveedores; proxy_pass http://$u:5175; }
  }

  # ── Panel de proveedores por tenant: <slug>.proveedores.localhost ──────────
  # Host propio del panel (Domain secundario del tenant): django-tenants resuelve el schema por
  # Host igual que en la operación, así el aislamiento y el JWT (claim tenant) no cambian.
  server {
    listen 80;
    server_name *.proveedores.localhost;
    location /health/ { set $u backend;              proxy_pass http://$u:8000; }
    location /api/    { set $u backend;              proxy_pass http://$u:8000; }
    location /media/  { set $u backend;              proxy_pass http://$u:8000; }
    location /        { set $u frontend-proveedores; proxy_pass http://$u:5175; }
  }

  # ── Tenant (default): <tenant>.localhost → data plane ──────────────────────
  # /api preserva el Host (resuelve el tenant); operación en /. El panel de proveedores ya NO
  # vive aquí: el path viejo /proveedores/… redirige (301) al host propio del panel para que
  # los correos y bookmarks anteriores al cambio sigan funcionando.
  server {
    listen 80 default_server;
    server_name _;
    location /health/       { set $u backend;               proxy_pass http://$u:8000; }
    location /api/          { set $u backend;               proxy_pass http://$u:8000; }
    location /media/        { set $u backend;               proxy_pass http://$u:8000; }
    location ~ ^/proveedores(?<resto>/.*)?$ {
      return 301 $scheme://$panel_proveedores_host$resto$is_args$args;
    }
    location /              { set $u frontend-acceso;       proxy_pass http://$u:5174; }
  }
}
