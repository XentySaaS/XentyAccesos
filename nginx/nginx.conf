worker_processes 1;
events { worker_connections 1024; }

http {
  # Encabezados comunes (heredados por todos los server/location).
  # Host se PRESERVA CON PUERTO ($http_host) para que django-tenants resuelva el tenant por
  # subdominio (ignora el puerto al matchear el dominio) y para que request.get_host() en el
  # backend construya URLs absolutas correctas en dev (incluye :8080 en los links de correo).
  map $http_upgrade $conn_upgrade { default upgrade; '' close; }
  proxy_set_header Host $http_host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_http_version 1.1;
  proxy_set_header Upgrade $http_upgrade;
  proxy_set_header Connection $conn_upgrade;

  # ── Landing pública: xenty.localhost ───────────────────────────────────────
  server {
    listen 80;
    server_name xenty.localhost www.localhost;
    location /health/ { proxy_pass http://superadmin-backend:8000; }
    location /api/ { proxy_pass http://superadmin-backend:8000; }
    location / { proxy_pass http://frontend-landing:5173; }
  }

  # ── Panel super-admin AISLADO: admin.localhost ─────────────────────────────
  server {
    listen 80;
    server_name admin.localhost;
    location /health/ { proxy_pass http://superadmin-backend:8000; }
    location /api/ { proxy_pass http://superadmin-backend:8000; }
    location / { proxy_pass http://frontend-admin:5176; }
  }

  # ── Tenant (default): <tenant>.localhost → data plane ──────────────────────
  # /api preserva el Host (resuelve el tenant); operación en /, proveedores en /proveedores/.
  server {
    listen 80 default_server;
    server_name _;
    location /health/ { proxy_pass http://backend:8000; }
    location /api/ { proxy_pass http://backend:8000; }
    location /media/ { proxy_pass http://backend:8000; }
    location /proveedores/ { proxy_pass http://frontend-proveedores:5175; }
    location / { proxy_pass http://frontend-acceso:5174; }
  }
}
