name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend (ruff + pytest)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: xenty_acceso
          POSTGRES_USER: xenty
          POSTGRES_PASSWORD: xenty
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U xenty"
          --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s --health-timeout 5s --health-retries 5
    env:
      DJANGO_SETTINGS_MODULE: config.settings.dev
      SECRET_KEY: ci-not-a-real-secret
      SECRET_KEY_FERNET: "-06Tk4CTbRP0a-Fw5vEeA2x4ZgsPFS0cNJlcfH79SQA="
      DEBUG: "True"
      DB_NAME: xenty_acceso
      DB_USER: xenty
      DB_PASSWORD: xenty
      DB_HOST: localhost
      DB_PORT: "5432"
      REDIS_URL: redis://localhost:6379
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements*.txt
      - name: Dependencias de sistema (libmagic para python-magic)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libmagic1
      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Ruff (lint + formato)
        run: |
          ruff check .
          ruff format --check .
      - name: Tests (incluye suite de aislamiento)
        run: pytest -q

  frontend:
    name: Frontend (build)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [frontend-acceso, frontend-proveedores, frontend-admin, frontend-landing]
    defaults:
      run:
        working-directory: ${{ matrix.app }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ${{ matrix.app }}/package-lock.json
      - name: Instalar
        run: npm ci
      - name: Build
        run: npm run build
