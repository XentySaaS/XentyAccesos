[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
ignore = [
    "E501",  # el ancho lo gobierna `ruff format`; E501 solo marcaría strings/comentarios/URLs no quebrables
    "B904",  # encadenar excepciones (`raise ... from`): deuda de estilo diferida (ver docs/TODOS.md)
]

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "config.settings.dev"
python_files = ["test_*.py", "*_test.py"]
