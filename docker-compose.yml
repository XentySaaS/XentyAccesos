services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-xenty_acceso}
      POSTGRES_USER: ${DB_USER:-xenty}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-xenty}
    ports: ["5434:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-xenty}"]
      interval: 5s
      timeout: 3s
      retries: 12

  redis:
    image: redis:7-alpine
    ports: ["6381:6379"]

  mailpit:
    image: axllent/mailpit:latest
    ports: ["8025:8025", "1025:1025"]

  # Data plane: aplica migraciones compartidas al arrancar y sirve la API del tenant.
  backend:
    build: ./backend
    command: sh -c "python manage.py migrate_schemas --shared && python manage.py bootstrap_public && python manage.py migrate_schemas --tenant && python manage.py runserver 0.0.0.0:8000 --noreload"
    env_file: [.env]
    volumes: ["./backend:/app", "/app/.venv"]
    ports: ["8002:8000"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_started }

  celery-worker:
    build: ./backend
    command: celery -A config worker -l info
    env_file: [.env]
    volumes: ["./backend:/app", "/app/.venv"]
    depends_on: [backend, redis]

  celery-beat:
    build: ./backend
    command: celery -A config beat -l info
    env_file: [.env]
    volumes: ["./backend:/app", "/app/.venv"]
    depends_on: [backend, redis]

  # Control plane (super-admin / signup): schema public.
  superadmin-backend:
    build: ./backend
    command: python manage.py runserver 0.0.0.0:8000 --noreload
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.control_plane
    env_file: [.env]
    volumes: ["./backend:/app", "/app/.venv"]
    ports: ["8003:8000"]
    depends_on:
      backend: { condition: service_started }
      postgres: { condition: service_healthy }

  # ── SPAs (Vite dev; el proxy /api apunta al servicio del compose) ──────────
  # Landing pública: alta self-service de empresas (cara al usuario final).
  frontend-landing:
    build: ./frontend-landing
    environment:
      VITE_PROXY_TARGET: http://superadmin-backend:8000
    volumes: ["./frontend-landing:/app", "/app/node_modules"]
    ports: ["5173:5173"]
    depends_on: [superadmin-backend]

  frontend-acceso:
    build: ./frontend-acceso
    environment:
      VITE_PROXY_TARGET: http://backend:8000
    volumes: ["./frontend-acceso:/app", "/app/node_modules"]
    ports: ["5174:5174"]
    depends_on: [backend]

  frontend-proveedores:
    build: ./frontend-proveedores
    environment:
      VITE_PROXY_TARGET: http://backend:8000
    volumes: ["./frontend-proveedores:/app", "/app/node_modules"]
    ports: ["5175:5175"]
    depends_on: [backend]

  frontend-admin:
    build: ./frontend-admin
    environment:
      VITE_PROXY_TARGET: http://superadmin-backend:8000
    volumes: ["./frontend-admin:/app", "/app/node_modules"]
    ports: ["5176:5176"]
    depends_on: [superadmin-backend]

  # Reverse proxy: implementa la topología por dominios (LP / tenant / super-admin).
  # Dev en :8080 (XAMPP suele ocupar :80). Preserva Host -> el tenant se resuelve por subdominio.
  nginx:
    image: nginx:alpine
    volumes: ["./nginx/nginx.conf:/etc/nginx/nginx.conf:ro"]
    ports: ["8080:80"]
    depends_on:
      - frontend-landing
      - frontend-acceso
      - frontend-proveedores
      - frontend-admin
      - backend
      - superadmin-backend

volumes:
  pgdata:
